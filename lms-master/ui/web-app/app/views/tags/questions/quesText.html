%{
   ques=_ques;
}%             
#{if !ques.isNull('options')&&ques.options.length()>0}
%{
    options=ques.options;
}%
<div class="big15">${ques.content.raw()}</div>
<div class='quesOptions margTop'>
    #{list items:0..options.length()-1,as:'opt'}
    <div class='quesOption'>
        <span class="floatLeft">
            ${uicom.util.Utilities.getOption((opt+1))}
        </span>
        <div class="margLeft20 quesOptionBody">${options.get(opt).raw()}</div>
    </div>
    #{/list}
</div>                        
<div class='cleaner_with_divider'>&nbsp;</div>
#{/if}  
#{else}
<div class="big15 margBot10">${ques.content.raw()}</div>
#{/else}
