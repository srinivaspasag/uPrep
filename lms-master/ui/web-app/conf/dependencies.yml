# Application dependencies

require:
    - play
    - ui-commons -> ui-commons

repositories:
    - My External:
        type:       local
        artifact:   ${application.path}/../[module]
        contains:
            - ui-commons
            
    - external:
        type:       local
        artifact:   ${application.path}/../[module]/public/images/
        contains:
            - ui-commons