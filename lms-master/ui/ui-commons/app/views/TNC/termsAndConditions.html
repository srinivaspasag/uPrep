    #{extends 'tncHeader.html' /}
    #{set title:'Terms and Conditions' /}
<div id="TnCPopup">
		<div class="acceptTnC">
			<div class="TnCHead">&{'TNC.TITLE'}</div>
			<div class="TnCBody">
                            #{include 'TermsAndConditions/endUserAgreement.html' /}
			</div>	
			<div style="text-align:right;">
				<span class="greyButton submitBtn" data-agrees=false >&{'TNC.TXT_DONT_AGREE'}</span>
				<span class="greenButton submitBtn" data-agrees=true >&{'TNC.TXT_AGREED'}</span>
			</div>
		</div>
	</div>
        <script type="text/javascript">
                $(function(){
			var loginOrgId = "${session.loginOrgId!=null?session.loginOrgId:""}";
                        var popup = showVPopup(0.6,true);
                        var div = $("#TnCPopup");
                        popup.html(div.html());
                        $(".submitBtn").on("click",function(){
                                var $this = $(this);
                                var params = {"agrees":$this.data("agrees"),"version":"${session.get('TNC-CODE')}"};
				if(loginOrgId){
					params.orgId = loginOrgId;
				}
                                window.top.location.href = "@{TNC.acceptUserTNC}?"+$.param(params);
                        });
                        $(".TnCBody").css({"max-height":(0.7*window.innerHeight)+"px"});
                        $(".crossVPopup").remove();
                });	
        </script>
