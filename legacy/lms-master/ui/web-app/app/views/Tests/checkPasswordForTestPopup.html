<style type="text/css">
.nameText{
        font-size:20px;
        font-weight:bold;
        padding-bottom:3px;
        margin-bottom:12px;
}
.signupErrorDiv{
    color: red;
}
.testPasswordPopup{
    padding:10px;
}
.checkingPasswordTable{
    padding:15px;
    width:600px;
    background-color:#F4F4F4;
    margin-top: 2%;
}
.checkingPasswordTable tr.nonner{
    display: none;
}
.checkingPasswordTable th{
    font-size:14px;
    color:#555;
    padding:5px 7px;
    width:30%;
}
.checkingPasswordTable td{
    padding:5px;
}
.checkingPasswordTable textarea,
.checkingPasswordTable input{
    padding:4px 8px;
    font-size:14px;
    color:#333;
    height:16px;
    width:95%;
    margin-bottom:5px;
}
.checkingPasswordTable textarea{
    height:100%;
}
.checkingPasswordTable input[type="checkbox"]{
    width:15px;
    height:15px;
}
.checkingPasswordTable textarea:focus,
.checkingPasswordTable select:focus,
.checkingPasswordTable input:focus{
    border:1px solid #333;
    outline:none;
}

.checkingPasswordTable textarea::-webkit-input-placeholder,
.checkingPasswordTable input::-webkit-input-placeholder{
    font-style: italic;
    font-size:12px;
    color:#999;
}

.checkingPasswordTable input:-moz-placeholder{
    font-style: italic;
    font-size:12px;
    color:#999;
}
.checkingPasswordTable select{
    font-size:13px;
    padding:4px 6px;
    height:26px;
    color:#444;
    margin:0px;
}
.paymentEntryDeleteNotation{
    background: url("/public/images/module/delete.png") no-repeat scroll 0 0 transparent;
    cursor: pointer;
    display: inline-block;
    height: 16px;
    margin: 0 5px 5px;
    width: 20px;
}
.paymentEntryDeleteTd{
    width: 25px;
    max-width: 25px;
    float: right;
}
.toggle-password{
    top:3px;
    position: relative;
}
</style>
<div class="checkPasswordForTestPopup">
    <span class="nameText">Please Enter the Password For Test:</span>
    <table class="checkingPasswordTable" cellspacing=0 cellpadding=2>
        <tr>
            <th>Password :</th>
            <td>
                <input id="passwordForTest" type="password" placeholder="Password..."/>
            </td>
        </tr>
        <tr>
            <td>
                <input type="checkbox" class="toggle-password" name="show-password"/>
                <span class="big12">Show Password</span>
            </td>
        </tr>
        
        <tr>
            <td colspan=2 class="rightText">
                    <span class="blueButton checkPassword" data-action="${action}">Submit Password</span>
            </td>
        </tr>
    </table>
    <div class="signupErrorDiv nonner margLeft5">Wrong Password please try again.</div>
</div>
