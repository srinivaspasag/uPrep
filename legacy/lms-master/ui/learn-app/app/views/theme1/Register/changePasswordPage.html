<body>
<div class="col-md-6 col-md-offset-3 updatePasswordWrapper" style="padding-top: 80px;">
    <!-- <h1>Reset Password</h1> -->
    <div class="card" id="l-register">
    <h4 style="padding-top: 20px;padding-left: 20px;">&{'login.CHNG_PASSWORD'}</h4>
      <!-- <div class="lcb-form"> -->
      <div class="card-header">
          <center>
            <img class="img-responsive" id="lpimage" src="/public/outerAssets/images/vedantutm.png">
          </center>
        </div>
        <div class="card-body passwordContent">
            <div class="input-group m-b-20" id="usernamegroup">
              <span class="input-group-addon"><i class="zmdi zmdi-lock-open"></i></span>
              <div class="fg-line">
                <input class="form-control" id="newPassword" name="cPassword" placeholder="New Password" required="" type="password">
              </div>
            </div>
            <div class="input-group m-b-20">
              <span class="input-group-addon"><i class="zmdi zmdi-lock"></i></span>
              <div class="fg-line" id="emailgroup">
                <input class="form-control"  id="confirmPassword" name="vPassword" placeholder="Confirm Password" required="" type="password"> <!-- <div class="signupErrorDiv" style="color: red;"></div> -->
                 <!-- <span class="zmdi form-control-feedback" style="display: none;"></span> <small class="help-block" id="emailHelp"></small> -->
              </div>
            </div>
            <center>
              <button class="btn btn-success btn-md waves-effect changeButton" id="clickToSignUp" type="submit">Update Password</button>
            </center>
          <br>
            <div class="m-l-20">
              You are signing in from:<b>${emailId}</b>
              <div class="errorWrapper centerText" style="display:none;">
              <span class="blankError redTextColor">&{'login.BLANK_FIELD'}</span>
              <span class="mismatchError redTextColor">&{'login.PWD_MISMATCH'}</span>
              <span class="minCharError redTextColor">&{'login.PWD_MIN_FIVE_CHAR'}</span>
              <div class="commonMsg">&{'login.RETRY_RESET_PASS'} <a href="mailto:info@learnpedia.in">contact us</a></div>
            </div>
            <div class="serverErrorMsg centerText">
                <span class="INVALID_VERIFICATION_CODE">&{'login.INVALID_VERIFICATION_CODE'}</span>
                <span class="NOT_REGISTERED INVALID_ID USER_NOT_FOUND redTextColor">&{'login.INVALID_ID'}</span>
                <div>&{'login.RETRY_RESET_PASS'} <a href="mailto:info@learnpedia.in">contact us</a></div>
            </div>
          </div>
        </div>
        <input type="hidden" value="${emailId}" id="emailPass"/>
        <input type="hidden" value="${code}" id="veriKey"/>
        <input type="hidden" value="${userId}" id="passUserId"/>
        <input type="hidden" value="${params.orgId}" id="organizationId"/>
  </div>
</div>
