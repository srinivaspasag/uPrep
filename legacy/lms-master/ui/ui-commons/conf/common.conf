# Store path for Blob content
attachments.path=data/attachments

# Specify memcached host (default to 127.0.0.1:11211)
memcached.host=127.0.0.1:11211
%prod.memcached.host=memc.learnpedia.in:11211
#

# Testing. Set up a custom configuration for test mode
# ~~~~~
#%test.module.cobertura=${play.path}/modules/cobertura
%test.application.mode=dev
%test.db.url=jdbc:h2:mem:play;MODE=MYSQL;LOCK_MODE=0
%test.jpa.ddl=create
%test.mail.smtp=mock

#TEST_CONFIG
# ~~~~~~~~~~~~~~~~~
#WHILE Test is in progress these config will be followed
DEFAULT_TEST_CACHE_EXPIRY_TIME_HR = 24h
TEST_CACHE_GRACE_TIME_MILISEC = 10000
#10 seconds grace time assumed for network time used to load test page and other data.
INST_DEFAULT_IMG_PATH = /public/images/instDefault.jpg


# execution pool [overriding commons]
# ~~~~~~~~~~~~~~~~~~~~~~~~
play.pool=5
%dev.play.pool=10
%qa.play.pool=10
%prod.play.pool=10

#defaultDomain cookie
%dev.application.defaultCookieDomain=.learnpedia.in
%qa.application.defaultCookieDomain=.learnpedia.in
%prod.application.defaultCookieDomain=.learnpedia.in
%demo.application.defaultCookieDomain=.learnpedia.in

#common secret key for all the applications
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
application.secret="__REDACTED__"
%dev.application.secret="__REDACTED__"
%qa.application.secret="__REDACTED__"
%prod.application.secret="__REDACTED__"
%demo.application.secret="__REDACTED__"
# Session configuration
# ~~~~~~~~~~~~~~~~~~~~~~
# By default, session will be written to the transient PLAY_SESSION cookie.
# The cookies are not secured by default, only set it to true
# if you're serving your pages through https.


application.session.cookie=LEARNPEDIA_LOCAL
%dev.application.session.cookie=LEARNPEDIA_DEV
%qa.application.session.cookie=LEARNPEDIA_QA
%prod.application.session.cookie=LEARNPEDIA_PROD
%demo.application.session.cookie=LEARNPEDIA_DEMO


 application.session.sendOnlyIfChanged=true
# application.session.maxAge=1h
 application.session.secure=false
%dev.application.session.secure=true
%qa.application.session.secure=true
%prod.application.session.secure=true
%demo.application.session.secure=true


