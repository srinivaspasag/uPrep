<div class="virNumericKeyboard" data-input-box-class="${_inputClassName}">
         #{list items:0..9,as:'nkeys'}
                 <span class="VNKeys" data-val="${nkeys}" title="${nkeys}">${nkeys}</span>
         #{/list}
         <span class="VNKeys" data-val="." title="dot">.</span>
         <span class="VNKeys" data-val="-" title="minus">-</span>
         <span class="VNKeys" data-val="<" title="backspace"><-</span>
         <span class="VNKeys" title="delete all">Clear All</span>
</div>
