include "commons.qa.conf"

http.port=19015
jvm.memory="-Xms64M -Xmx256M"

#default wait time before produce a event to consume
reproduce.wait.time=300

#producer maxt tries 
max.tries=3

#challenge configurations
challenge.leaderboard.min.attempt=1

#task batchSize for event threadManager
task.batch.size="EXPORT:10;CALCULATE_SIZE:10"

#task number of threads for event threadManager
task.thread.number="EXPORT:3;CALCULATE_SIZE:10"

#sleep time for thread for task threadManager
task.sleep.time="EXPORT:10000"

#Vedantu website
infographic.link = "https://infoqa.vedantu.com"
