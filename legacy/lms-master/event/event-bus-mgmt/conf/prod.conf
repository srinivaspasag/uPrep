include "commons.prod.conf"

http.port=19015
jvm.memory="-Xms512M -Xmx1024M"

#default wait time before produce a event to consume
reproduce.wait.time=300000

#producer maxt tries 
max.tries=3

#challenge configurations
challenge.leaderboard.min.attempt=1

#Vedantu website
#infographic.link = "https://www.vedantu.com"

#[TASK-CONFIG
#task batchSize for event threadManager
task.batch.size="EXPORT:2;CALCULATE_SIZE:10"

#task number of threads for event threadManager
task.thread.number="EXPORT:2;CALCULATE_SIZE:10"

#sleep time for thread for task threadManager
task.sleep.time="EXPORT:10000;CALCULATE_SIZE:5000"

# number of threads for event threadManager
task.thread.number="CONVERT_VIDEO:3;CALCULATE_SIZE:10"

