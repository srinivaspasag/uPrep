name: UPrep
options:
  bundleIdPrefix: in.uprep
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  UPrep:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.uprep.app
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: UPrep
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Capture photos or videos to upload to UPrep."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach photos or videos to upload to UPrep."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio when uploading media to UPrep."
