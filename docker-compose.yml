# Uprep LMS — full stack for a single host (e.g. Oracle Cloud Ampere VM).
#
#   docker compose up -d --build
#
# Build once: the 8 lms_nextgen services all run from the same image
# (uprep-lms:latest) and select their jar via the SERVICE env var.

x-lms-common: &lms-common
  image: uprep-lms:latest
  build:
    context: ./lms_nextgen-master
  restart: unless-stopped
  depends_on:
    mongo:
      condition: service_healthy
  environment:
    SPRING_PROFILES_ACTIVE: prod
    JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not published to the host by default — only reachable on the compose network.

  user-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: user-services
      SERVER_PORT: "8081"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8081:8081"]

  organization-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: organization-services
      SERVER_PORT: "8082"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8082:8082"]

  content-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: content-services
      SERVER_PORT: "8083"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8083:8083"]

  cmds-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: cmds-services
      SERVER_PORT: "8084"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8084:8084"]

  board-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: board-services
      SERVER_PORT: "8085"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8085:8085"]

  social-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: social-services
      SERVER_PORT: "8086"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8086:8086"]

  comm-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: comm-services
      SERVER_PORT: "8087"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8087:8087"]

  event-services:
    <<: *lms-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
      SERVICE: event-services
      SERVER_PORT: "8088"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["8088:8088"]

  virtual-classroom:
    build:
      context: ./virtual-classroom-service-main
    image: uprep-virtual-classroom:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SERVER_PORT: "20000"
      SPRING_DATA_MONGODB_HOST: mongo
    ports: ["20000:20000"]

  # Optional: serve the PHP marketing/site here too. If you deploy the site to
  # Vercel (Road A), you can remove this service.
  website:
    image: php:8.2-apache
    restart: unless-stopped
    volumes:
      - ./uprep-website-master:/var/www/html
    ports: ["80:80"]

volumes:
  mongo-data:
